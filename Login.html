<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Cho thuê đồ chơi</title>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            display: flex;
            width: 800px;
            background-color: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .login-left {
            flex: 1;
            padding: 40px;
            border-right: 1px solid #ddd;
        }

        .login-left h2 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        .login-left p {
            margin-bottom: 30px;
            color: #555;
        }

        .login-left input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 25px;
            font-size: 14px;
        }

        .login-left button {
            width: 100%;
            padding: 12px;
            background-color: #1976d2;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }

        .login-left button:hover {
            background-color: #1565c0;
        }

        .login-left a {
            display: block;
            margin-top: 10px;
            text-align: right;
            font-size: 14px;
            color: #1976d2;
            text-decoration: none;
        }

        .login-right {
            flex: 1;
            background-color: #e6f2ff;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-right h3 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .social-icons {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .social-icons a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 22px;
            text-decoration: none;
        }

        .facebook {
            background-color: #1877f2;
            color: #ffff;

        }

        .facebook i {
            color: white;
        }

        .google {
            background-color: white;
            border: 1px solid #ccc;
        }

        .google i {
            font-size: 22px;
            background: conic-gradient(from -45deg,
                    #ea4335 0deg 90deg,
                    #34a853 90deg 180deg,
                    #4285f4 180deg 270deg,
                    #fbbc05 270deg 360deg);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-right p {
            margin-top: 15px;
        }

        .login-right a {
            color: #1b309a;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="login-container">

        <div class="login-left">
            <h2>Đăng nhập</h2>
            <p>Đồ chơi giáo dục đa dạng</p>
            <input type="text" placeholder="Email hoặc Username">
            <input type="password" placeholder="Mật khẩu">
            <button>Đăng nhập</button>
            <a href="#">Quên mật khẩu?</a>
        </div>


        <div class="login-right">
            <h3>Hoặc đăng nhập với</h3>
            <p>Kết nối nhanh bằng tài khoản mạng xã hội</p>
            <div class="social-icons">
                <a href="#" class="facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="google"><i class="fab fa-google"></i></a>
            </div>
            <p>Chưa có tài khoản? <a href="#">Đăng ký ngay</a></p>
        </div>
    </div>
</body>

</html>
